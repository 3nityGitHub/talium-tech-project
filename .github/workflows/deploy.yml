name: Talium Tech CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  ECR_BACKEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-2.amazonaws.com/talium-tech-backend
  ECR_FRONTEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-2.amazonaws.com/talium-tech-frontend
  ECS_CLUSTER: talium-tech-cluster
  BACKEND_SERVICE: talium-tech-backend-service
  FRONTEND_SERVICE: talium-tech-frontend-service
  BACKEND_TASK_FAMILY: talium-tech-backend
  FRONTEND_TASK_FAMILY: talium-tech-frontend
  ALB_URL: http://talium-tech-alb-649139136.eu-west-2.elb.amazonaws.com

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run pytest
        working-directory: backend
        run: pytest -v

  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Generate image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push backend image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag $ECR_BACKEND:${{ steps.tag.outputs.tag }} \
            --tag $ECR_BACKEND:latest \
            --push \
            ./backend
      - name: Build and push frontend image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg VITE_API_BASE_URL=$ALB_URL \
            --tag $ECR_FRONTEND:${{ steps.tag.outputs.tag }} \
            --tag $ECR_FRONTEND:latest \
            --push \
            ./frontend

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Update backend ECS service
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $BACKEND_TASK_FAMILY \
            --query 'taskDefinition' \
            --output json)
          NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          td['containerDefinitions'][0]['image'] = '$ECR_BACKEND:${{ needs.build.outputs.image-tag }}'
          for key in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          print(json.dumps(td))
          ")
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $BACKEND_SERVICE \
            --task-definition $NEW_ARN
      - name: Update frontend ECS service
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $FRONTEND_TASK_FAMILY \
            --query 'taskDefinition' \
            --output json)
          NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          td['containerDefinitions'][0]['image'] = '$ECR_FRONTEND:${{ needs.build.outputs.image-tag }}'
          for key in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          print(json.dumps(td))
          ")
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $FRONTEND_SERVICE \
            --task-definition $NEW_ARN
      - name: Wait for backend deployment
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $BACKEND_SERVICE
          echo "Backend deployment stable"
      - name: Wait for frontend deployment
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $FRONTEND_SERVICE
          echo "Frontend deployment stable"
      - name: Deployment complete
        run: |
          echo "======================================"
          echo "Talium Tech deployed successfully"
          echo "Image tag: ${{ needs.build.outputs.image-tag }}"
          echo "URL: $ALB_URL"
          echo "======================================"
